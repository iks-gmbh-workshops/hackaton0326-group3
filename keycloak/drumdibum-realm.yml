realm: drumdibum
enabled: true
displayName: Drumdibum
#general settings
loginWithEmailAllowed: true
duplicateEmailsAllowed: false
registrationAllowed: true
resetPasswordAllowed: true
verifyEmail: true
loginTheme: keycloakify-starter

roles:
  realm:
    - name: REGISTERED_USER
      description: Logged-in user with basic access
    - name: GROUP_MEMBER
      description: Member of a group
    - name: ACTIVITY_MEMBER
      description: Assigned to an activity
    - name: GROUP_ADMIN
      description: Manages group and activities
    - name: SYSTEM_ADMIN
      description: Full system visibility and control

defaultRoles:
  - REGISTERED_USER

clients:
  - clientId: drumdibum-frontend
    name: Drumdibum Frontend
    description: Public client for the frontend SPA
    enabled: true
    publicClient: true
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    implicitFlowEnabled: false
    protocol: openid-connect
    rootUrl: http://localhost:3000
    baseUrl: /
    redirectUris:
      - http://localhost:3000/*
    webOrigins:
      - http://localhost:3000
    attributes:
      pkce.code.challenge.method: S256
      post.logout.redirect.uris: http://localhost:3000/*

  - clientId: drumdibum-backend
    name: Drumdibum Backend
    description: Confidential client for the backend API
    enabled: true
    publicClient: false
    bearerOnly: false
    serviceAccountsEnabled: true
    standardFlowEnabled: false
    directAccessGrantsEnabled: false
    implicitFlowEnabled: false
    protocol: openid-connect
    secret: $(DRUMDIBUM_BACKEND_CLIENT_SECRET)
    attributes: {}

users:
  - username: service-account-drumdibum-backend
    enabled: true
    clientRoles:
      realm-management:
        - manage-users
        - view-users

smtpServer:
  host: $(SMTP_SERVER_URL)
  port: $(SMTP_SERVER_PORT)
  from: $(NO_REPLY_MAIL)
  fromDisplayName: "No Reply GENCHA"
  auth: true
  user: $(SMTP_USER)
  password: $(SMTP_USER_PASSWORD)
  starttls: false
  ssl: true
