realm: drumdibum
enabled: true
displayName: Drumdibum

roles:
  realm:
    - name: REGISTERED_USER
      description: Logged-in user with basic access
    - name: GROUP_MEMBER
      description: Member of a group
    - name: ACTIVITY_MEMBER
      description: Assigned to an activity
    - name: GROUP_ADMIN
      description: Manages group and activities
    - name: SYSTEM_ADMIN
      description: Full system visibility and control

defaultRoles:
  - REGISTERED_USER

clients:
  - clientId: drumdibum-frontend
    name: Drumdibum Frontend
    description: Public client for the frontend SPA
    enabled: true
    publicClient: true
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    implicitFlowEnabled: false
    protocol: openid-connect
    rootUrl: http://localhost:4200
    baseUrl: /
    redirectUris:
      - http://localhost:4200/*
    webOrigins:
      - http://localhost:4200
    attributes:
      pkce.code.challenge.method: S256
      post.logout.redirect.uris: http://localhost:4200/*

  - clientId: drumdibum-backend
    name: Drumdibum Backend
    description: Confidential client for the backend API
    enabled: true
    publicClient: false
    bearerOnly: false
    serviceAccountsEnabled: true
    standardFlowEnabled: false
    directAccessGrantsEnabled: false
    implicitFlowEnabled: false
    protocol: openid-connect
    secret: $(DRUMDIBUM_BACKEND_CLIENT_SECRET)
    attributes: {}

users:
  - username: service-account-drumdibum-backend
    enabled: true
    clientRoles:
      realm-management:
        - manage-groups
        - view-groups

smtpServer:
  host: ""
  port: ""
  from: ""
  fromDisplayName: ""
  replyTo: ""
  replyToDisplayName: ""
  ssl: ""
  starttls: ""
  auth: ""
  user: ""
  password: ""
