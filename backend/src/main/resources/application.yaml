server:
  port: 8000

keycloak:
  admin:
    base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:drumdibum}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:${KEYCLOAK_CLIENT_ID:drumdibum-backend}}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:${KEYCLOAK_CLIENT_SECRET:QNCDUKfk9WKuUszfpNxVbU0mKIdjPzj0}}
    invite-client-id: ${KEYCLOAK_INVITE_CLIENT_ID:drumdibum-frontend}
    invite-actions-lifespan-seconds: ${KEYCLOAK_INVITE_ACTIONS_LIFESPAN_SECONDS:86400}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

logging:
  level:
    com.iks.backend.group: ${LOG_LEVEL_GROUP:DEBUG}
    com.iks.backend.keycloak: ${LOG_LEVEL_KEYCLOAK:DEBUG}

spring:
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/keycloak}
    username: ${DB_USERNAME:keycloak}
    password: ${DB_PASSWORD:keycloak}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: ${SMTP_SERVER_URL:mail.iks-gmbh.com}
    port: ${SMTP_SERVER_PORT:465}
    username: ${SMTP_USER:no-reply@iks-gmbh.com}
    password: osesESEHalIACtAlliFEoStronAVEnct,50,{
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
    from: ${NO_REPLY_MAIL:no-reply@iks-gmbh.com}
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:drumdibum-backend}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:QNCDUKfk9WKuUszfpNxVbU0mKIdjPzj0}
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/drumdibum}
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/drumdibum}
