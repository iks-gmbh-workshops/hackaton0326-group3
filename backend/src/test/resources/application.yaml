app:
  frontend-base-url: http://localhost:3000

keycloak:
  admin:
    base-url: http://localhost:18080
    realm: test-realm
    client-id: test-client
    client-secret: test-secret
    invite-client-id: test-invite
    invite-actions-lifespan-seconds: 3600

spring:
  datasource:
    url: jdbc:h2:mem:backend-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    from: test@example.com
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: test-client
            client-secret: test-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            authorization-uri: http://localhost:18080/realms/test-realm/protocol/openid-connect/auth
            token-uri: http://localhost:18080/realms/test-realm/protocol/openid-connect/token
            jwk-set-uri: http://localhost:18080/realms/test-realm/protocol/openid-connect/certs
            user-info-uri: http://localhost:18080/realms/test-realm/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:18080/realms/test-realm/protocol/openid-connect/certs
