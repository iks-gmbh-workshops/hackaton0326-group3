services:
  postgres:
    image: postgres:17
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    env_file: .env
    command: start-dev
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:6.4.1-26
    env_file: .env
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_FILES_LOCATIONS: /config/*
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      DRUMDIBUM_BACKEND_CLIENT_SECRET: ${DRUMDIBUM_BACKEND_CLIENT_SECRET}
      SMTP_SERVER_URL: ${SMTP_SERVER_URL}
      SMTP_SERVER_PORT: ${SMTP_SERVER_PORT}
      NO_REPLY_MAIL: ${NO_REPLY_MAIL}
      SMTP_USER: ${SMTP_USER}
      SMTP_USER_PASSWORD: ${SMTP_USER_PASSWORD}
    volumes:
      - ./keycloak:/config
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
